<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor scény 64x64</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-color: #252526;
            --text-color: #cccccc;
            --accent-color: #007acc;
            --accent-glow: rgba(0, 122, 204, 0.35);
            --border-color: #3e3e42;
            --input-bg: #3c3c3c;
            --highlight: #444;
            --radius: 4px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--panel-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--highlight);
        }

        /* --- Layout --- */
        .sidebar-left,
        .sidebar-right {
            width: 280px;
            min-width: 280px;
            background-color: var(--panel-color);
            border-right: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .main-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #121212;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            position: relative;
            overflow-y: auto;
            padding: 0 4rem;
        }

        /* --- Components --- */
        h2 {
            margin: 14px 15px 8px;
            font-size: 12px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.85;
        }

        .panel-section {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        button {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 6px 10px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 4px;
            text-align: left;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.12s ease, border-color 0.12s ease, color 0.12s ease;
        }

        button:hover {
            background-color: var(--highlight);
            color: #fff;
        }

        button:active {
            transform: translateY(1px);
        }

        button.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        button:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .row {
            display: flex;
            gap: 5px;
            align-items: center;
            margin-bottom: 6px;
        }

        .row label {
            width: 80px;
            color: #999;
            font-size: 12px;
        }

        .row input[type="number"],
        .row input[type="text"] {
            flex-grow: 1;
        }

        input,
        select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: white;
            padding: 5px 6px;
            width: 100%;
            font-size: 12px;
            transition: border-color 0.12s ease, box-shadow 0.12s ease;
        }

        input:hover,
        select:hover {
            border-color: #5a5a60;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        input[type="color"] {
            padding: 2px;
            height: 28px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: auto;
            flex-grow: 0;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        /* --- Layer Tree --- */
        .layer-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 5px 0;
        }

        .layer-item {
            padding: 5px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
            border-left: 2px solid transparent;
            transition: background-color 0.1s ease;
        }

        .layer-item:hover {
            background-color: #2a2d2e;
        }

        .layer-item.selected {
            background-color: #2d3f4f;
            border-left: 2px solid var(--accent-color);
        }

        .indent {
            width: 15px;
            height: 1px;
            display: inline-block;
        }

        .layer-icon {
            width: 16px;
            display: inline-block;
            text-align: center;
            margin-right: 5px;
            opacity: 0.7;
        }

        /* --- Canvas --- */
        canvas {
            margin: auto;
            width: 512px;
            height: 512px;
            image-rendering: pixelated;
            background-color: #000;
            border: 1px solid #444;
            border-radius: 2px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        #status-bar {
            margin-top: 12px;
            color: #888;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 4px 10px;
            font-size: 12px;
            font-family: 'Consolas', monospace;
        }

        /* --- Code Output --- */
        textarea {
            width: 100%;
            height: 200px;
            background-color: #101010;
            color: #9cdcfe;
            border: none;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            resize: vertical;
        }
    </style>
</head>

<body>

    <div class="sidebar-left">
        <h2>🛠️ Nástroje</h2>
        <div class="panel-section">
            <button id="tool-select" onclick="selectTool('select')" class="active"><span>↖</span> Kurzor (úprava/přesun)</button>
            <div style="height: 10px;"></div>
            <button id="tool-rectangle" onclick="selectTool('rectangle')"><span>▭</span> Obdélník</button>
            <button id="tool-circle" onclick="selectTool('circle')"><span>◯</span> Kruh</button>
            <button id="tool-line" onclick="selectTool('line')"><span>╱</span> Úsečka</button>
            <button id="tool-point" onclick="selectTool('point')"><span>·</span> Bod</button>
            <button id="tool-regpoly" onclick="selectTool('regularPolygon')"><span>⬡</span> Pravidelný mnohoúhelník</button>
            <button id="tool-poly" onclick="selectTool('polygon')"><span>⬠</span> Mnohoúhelník (volný)</button>
        </div>

        <h2>🗂️ Hierarchie scény</h2>
        <div class="panel-section" style="display:flex; gap:5px;">
            <button onclick="groupSelected()" style="flex:1;">📁 Seskupit (Shift+G)</button>
            <button onclick="deleteSelected()" style="flex:1; background:#5c2323; border-color:#7a2e2e;">🗑 Smazat</button>
        </div>
        <div class="layer-list" id="layer-list">
        </div>
    </div>

    <div class="main-area">
        <canvas id="canvas" width="64" height="64"></canvas>
        <div id="status-bar">X: 0 Y: 0</div>
    </div>

    <div class="sidebar-right">
        <h2>⚙️ Globální nastavení</h2>
        <div class="panel-section">
            <div class="row">
                <label>Šířka plátna</label>
                <input type="number" id="canvas-width" value="64" onchange="resizeCanvasWidth(this.value)">
            </div>
            <div class="row">
                <label>Výška plátna</label>
                <input type="number" id="canvas-height" value="64" onchange="resizeCanvasHeight(this.value)">
            </div>
        </div>
        <h2>📝 Vlastnosti</h2>
        <div class="panel-section" id="properties-panel">
            <p style="color:#666; font-style:italic; text-align:center;">Vyberte objekt k úpravě</p>
        </div>

        <h2>📤 Export</h2>
        <div class="panel-section">
            <button onclick="generateCode()">⚡ Vygenerovat kód</button>
            <button onclick="copyToClipboard()">📋 Zkopírovat do schránky</button>
        </div>
        <textarea id="output-code" readonly></textarea>
    </div>

    <script>
        // --- DATA STRUCTURES ---

        const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

        const SCENE = {
            root: {
                id: 'root',
                type: 'collection',
                name: 'Scene',
                x: 0, y: 0,
                z: 0,
                color: '#000000',
                children: []
            },
            objects: {}
        };

        const STATE = {
            tool: 'select',
            selectedIds: [],
            hoverId: null,
            dragStart: null,
            dragOffsets: {},
            isDragging: false,
            isResizing: false,
            resizeNodeId: null,
            resizeInvMat: null,
            resizeStart: null,
            isDrawing: false,
            drawStartPos: {x: 0, y: 0},
            polyVertices: [],
            defaultColor: '#ffffff',
            defaultFill: true,
            currentMouse: {x: 0, y: 0}
        };

        // --- DOM ELEMENTS ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const layerListEl = document.getElementById('layer-list');
        const propPanelEl = document.getElementById('properties-panel');
        const codeOutputEl = document.getElementById('output-code');
        const statusEl = document.getElementById('status-bar');

        // --- CORE FUNCTIONS ---
        function init() {
            SCENE.objects['root'] = SCENE.root;
            renderLayerList();
            renderCanvas();
        }

        function resizeCanvasWidth(val) {
            const size = parseInt(val) || 64;
            canvas.width = size;
            canvas.style.width = (size * 8) + 'px';
            renderCanvas();
        }

        function resizeCanvasHeight(val) {
            const size = parseInt(val) || 64;
            canvas.style.height = (size * 8) + 'px';
            canvas.height = size;
            renderCanvas();
        }

        // --- FACTORY ---
        function createShape(type, props) {
            const id = uid();
            const uniqueSuffix = id.substr(id.length - 3);
            const shape = {
                id: id,
                type: type,
                name: type + '_' + uniqueSuffix,
                parent: 'root',
                rotation: 0,
                z: 0,
                pivotX: 0,
                pivotY: 0,
                ...props
            };
            SCENE.objects[id] = shape;
            SCENE.objects['root'].children.push(id);
            return shape;
        }

        function createCollection() {
            const id = uid();
            const uniqueSuffix = id.substr(id.length - 3);
            const col = {
                id: id,
                type: 'collection',
                name: 'Group_' + uniqueSuffix,
                parent: 'root',
                x: 0, y: 0,
                z: 0,
                color: '#ffffff',
                rotation: 0,
                children: []
            };
            SCENE.objects[id] = col;
            return col;
        }

        // --- SCENE MANAGEMENT ---
        function groupSelected() {
            if (STATE.selectedIds.length === 0) return;
            const group = createCollection();
            const firstItem = SCENE.objects[STATE.selectedIds[0]];
            const oldParentId = firstItem.parent;
            const oldParent = SCENE.objects[oldParentId];

            group.parent = oldParentId;
            oldParent.children.push(group.id);

            STATE.selectedIds.forEach(id => {
                const obj = SCENE.objects[id];
                const currentParent = SCENE.objects[obj.parent];
                currentParent.children = currentParent.children.filter(childId => childId !== id);
                group.children.push(id);
                obj.parent = group.id;
            });

            STATE.selectedIds = [group.id];
            renderLayerList();
            renderCanvas();
            updatePropertiesPanel();
        }

        function moveObject(childId, newParentId) {
            if (!childId || !newParentId || childId === newParentId) return;

            const child = SCENE.objects[childId];
            const newParent = SCENE.objects[newParentId];

            let temp = newParent;
            while (temp.parent) {
                if (temp.parent === childId) {
                    alert("Nelze přesunout skupinu do jejího vlastního potomka!");
                    return;
                }
                if (temp.parent === 'root') break;
                temp = SCENE.objects[temp.parent];
            }

            if (child.parent) {
                const oldParent = SCENE.objects[child.parent];
                oldParent.children = oldParent.children.filter(c => c !== childId);
            }

            newParent.children.push(childId);
            child.parent = newParentId;

            renderLayerList();
            renderCanvas();
        }

        function deleteSelected() {
            STATE.selectedIds.forEach(id => {
                deleteObjectRecursive(id);
            });
            STATE.selectedIds = [];
            renderLayerList();
            renderCanvas();
            updatePropertiesPanel();
        }

        function deleteObjectRecursive(id) {
            const obj = SCENE.objects[id];
            if (!obj) return;
            if (obj.parent && SCENE.objects[obj.parent]) {
                const parent = SCENE.objects[obj.parent];
                parent.children = parent.children.filter(cid => cid !== id);
            }
            if (obj.children) {
                [...obj.children].forEach(childId => deleteObjectRecursive(childId));
            }
            delete SCENE.objects[id];
        }

        function getRandomHexColor() {
            return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        }

        // --- MATRIX HELPERS ---
        // Basic 2D Affine Matrix Helpers [a, b, c, d, e, f]
        function invertMatrix(m) {
            const [a, b, c, d, e, f] = m;
            const det = a * d - b * c;
            if (!det) return null;
            const invDet = 1 / det;
            return [
                d * invDet,
                -b * invDet,
                -c * invDet,
                a * invDet,
                (c * f - d * e) * invDet,
                (b * e - a * f) * invDet
            ];
        }

        function transformPoint(x, y, m) {
            return {
                x: x * m[0] + y * m[2] + m[4],
                y: x * m[1] + y * m[3] + m[5]
            };
        }

        function multiplyMatrices(m1, m2) {
            const [a1, b1, c1, d1, e1, f1] = m1;
            const [a2, b2, c2, d2, e2, f2] = m2;
            return [
                a1 * a2 + c1 * b2,
                b1 * a2 + d1 * b2,
                a1 * c2 + c1 * d2,
                b1 * c2 + d1 * d2,
                a1 * e2 + c1 * f2 + e1,
                b1 * e2 + d1 * f2 + f1
            ];
        }

        function getObjectMatrix(node) {
            const rad = (node.rotation || 0) * Math.PI / 180;
            const c = Math.cos(rad);
            const s = Math.sin(rad);

            const x = node.x || 0;
            const y = node.y || 0;

            const px = node.pivotX || 0;
            const py = node.pivotY || 0;

            return [
                c,
                -s,
                s,
                c,
                x + px * (1 - c) - py * s,
                y + py * (1 - c) + px * s
            ];
        }

        // --- RESIZE HANDLES ---
        function getGlobalMatrix(nodeId) {
            const chain = [];
            let curr = SCENE.objects[nodeId];
            while (curr) {
                chain.unshift(curr);
                if (!curr.parent) break;
                curr = SCENE.objects[curr.parent];
            }
            let mat = [1, 0, 0, 1, 0, 0];
            chain.forEach(n => { mat = multiplyMatrices(mat, getObjectMatrix(n)); });
            return mat;
        }

        function getResizeHandles(node) {
            if (node.type === 'rectangle') {
                const w = node.width, h = node.height;
                return [{x: 0, y: 0}, {x: w, y: 0}, {x: w, y: h}, {x: 0, y: h}];
            }
            if (node.type === 'circle' || node.type === 'regularPolygon') {
                const r = node.radius;
                return [{x: -r, y: -r}, {x: r, y: -r}, {x: r, y: r}, {x: -r, y: r}];
            }
            if (node.type === 'line') {
                return [{x: 0, y: 0}, {x: node.x2 - node.x, y: node.y2 - node.y}];
            }
            if (node.type === 'polygon' && node.vertices) {
                return node.vertices.map(v => ({x: v[0], y: v[1]}));
            }
            return [];
        }

        function hitTestResizeHandles(pos) {
            const tolerance = 2.5;
            for (const id of STATE.selectedIds) {
                const node = SCENE.objects[id];
                if (!node) continue;
                const handles = getResizeHandles(node);
                if (handles.length === 0) continue;
                const globalMat = getGlobalMatrix(id);
                for (let i = 0; i < handles.length; i++) {
                    const wp = transformPoint(handles[i].x, handles[i].y, globalMat);
                    if (Math.abs(wp.x - pos.x) <= tolerance && Math.abs(wp.y - pos.y) <= tolerance) {
                        return {nodeId: id, globalMat, corner: i};
                    }
                }
            }
            return null;
        }

        function oppositeRectCorner(cornerIndex, width, height) {
            const corners = [{x: 0, y: 0}, {x: width, y: 0}, {x: width, y: height}, {x: 0, y: height}];
            return corners[(cornerIndex + 2) % 4];
        }

        function hitTestPolygonEdge(node, globalMat, pos) {
            const invMat = invertMatrix(globalMat);
            if (!invMat || !node.vertices) return null;
            const local = transformPoint(pos.x, pos.y, invMat);
            const vs = node.vertices;
            const tolerance = 2;

            for (let i = 0; i < vs.length; i++) {
                const a = vs[i], b = vs[(i + 1) % vs.length];
                const dx = b[0] - a[0], dy = b[1] - a[1];
                const lenSq = dx * dx + dy * dy;
                let t = lenSq !== 0 ? ((local.x - a[0]) * dx + (local.y - a[1]) * dy) / lenSq : 0;
                t = Math.max(0, Math.min(1, t));
                const px = a[0] + t * dx, py = a[1] + t * dy;
                const dist = Math.sqrt((local.x - px) ** 2 + (local.y - py) ** 2);
                if (dist <= tolerance) {
                    return {insertIndex: i + 1, point: [Math.round(local.x), Math.round(local.y)]};
                }
            }
            return null;
        }

        // --- RENDERING ---
        function hexToRgba(hex) {return hex;}

        function renderSceneOnly() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            renderNode(SCENE.root, [1, 0, 0, 1, 0, 0]);
        }

        function renderCanvas() {
            renderSceneOnly();

            if (STATE.isDrawing && STATE.tool !== 'select' && STATE.tool !== 'polygon') {
                renderPreview();
            }
            if (STATE.tool === 'polygon' && STATE.polyVertices.length > 0) {
                renderPolyPreview();
            }

            drawHighlights();
        }

        function renderNode(node, parentMat) {
            if (!node) return;

            const localMat = getObjectMatrix(node);
            const globalMat = multiplyMatrices(parentMat, localMat);

            if (node.type !== 'collection' && node.id !== 'root') {
                ctx.save();
                ctx.transform(...globalMat);
                drawShapeVisual(node);
                ctx.restore();
            }

            if (node.children && node.children.length > 0) {
                const sortedChildren = [...node.children].sort((a, b) => {
                    return (SCENE.objects[a].z || 0) - (SCENE.objects[b].z || 0);
                });
                sortedChildren.forEach(childId => {
                    renderNode(SCENE.objects[childId], globalMat);
                });
            }
        }

        function drawShapeVisual(s) {
            ctx.fillStyle = s.color || '#fff';
            ctx.strokeStyle = s.color || '#fff';
            ctx.lineWidth = 1;

            ctx.beginPath();

            if (s.type === 'point') {
                ctx.fillRect(-0.5, -0.5, 1, 1);
            }
            else if (s.type === 'line') {
                ctx.moveTo(0, 0);
                ctx.lineTo(s.x2 - s.x, s.y2 - s.y);
                ctx.stroke();
            }
            else if (s.type === 'rectangle') {
                if (s.fill) ctx.fillRect(0, 0, s.width, s.height);
                else ctx.strokeRect(0, 0, s.width - 1, s.height - 1);
            }
            else if (s.type === 'circle') {
                ctx.arc(0, 0, s.radius, 0, Math.PI * 2);
                if (s.fill) ctx.fill(); else ctx.stroke();
            }
            else if (s.type === 'regularPolygon') {
                for (let i = 0; i < s.sides; i++) {
                    const angle = (i * 2 * Math.PI / s.sides) - (Math.PI / 2);
                    const px = s.radius * Math.cos(angle);
                    const py = s.radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath();
                if (s.fill) ctx.fill(); else ctx.stroke();
            }
            else if (s.type === 'polygon') {
                if (s.vertices && s.vertices.length > 0) {
                    ctx.moveTo(s.vertices[0][0], s.vertices[0][1]);
                    for (let i = 1; i < s.vertices.length; i++) {
                        ctx.lineTo(s.vertices[i][0], s.vertices[i][1]);
                    }
                    ctx.closePath();
                    if (s.fill) ctx.fill('evenodd'); else ctx.stroke();
                }
            }
        }

        // --- HIGHLIGHT SYSTEM (AABB + Pivot) ---
        function drawHighlights() {
            if (STATE.selectedIds.length === 0) return;

            const traverse = (node, parentMat) => {
                const localMat = getObjectMatrix(node);
                const globalMat = multiplyMatrices(parentMat, localMat);

                if (STATE.selectedIds.includes(node.id)) {
                    drawSelectionVisuals(node, globalMat);
                }

                if (node.children) {
                    node.children.forEach(cid => traverse(SCENE.objects[cid], globalMat));
                }
            };

            traverse(SCENE.root, [1, 0, 0, 1, 0, 0]);
        }

        function drawSelectionVisuals(node, globalMat) {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

            const expand = (pt) => {
                if (pt.x < minX) minX = pt.x;
                if (pt.x > maxX) maxX = pt.x;
                if (pt.y < minY) minY = pt.y;
                if (pt.y > maxY) maxY = pt.y;
            };

            const traverseBounds = (currNode, currMat) => {

                const addPoint = (lx, ly) => {
                    const g = transformPoint(lx, ly, currMat);
                    expand(g);
                };

                if (currNode.type === 'rectangle') {
                    addPoint(0, 0);
                    addPoint(currNode.width, 0);
                    addPoint(currNode.width, currNode.height);
                    addPoint(0, currNode.height);
                }
                else if (currNode.type === 'line') {
                    addPoint(0, 0);
                    addPoint(currNode.x2 - currNode.x, currNode.y2 - currNode.y);
                }
                else if (currNode.type === 'circle') {
                    const center = transformPoint(0, 0, currMat);
                    const r = currNode.radius;
                    expand({x: center.x - r, y: center.y - r});
                    expand({x: center.x + r, y: center.y + r});
                }
                else if (currNode.type === 'point') {
                    addPoint(0, 0);
                }
                else if (currNode.type === 'polygon') {
                    if (currNode.vertices) currNode.vertices.forEach(v => addPoint(v[0], v[1]));
                }
                else if (currNode.type === 'regularPolygon') {
                    for (let i = 0; i < currNode.sides; i++) {
                        const angle = (i * 2 * Math.PI / currNode.sides) - (Math.PI / 2);
                        const px = currNode.radius * Math.cos(angle);
                        const py = currNode.radius * Math.sin(angle);
                        addPoint(px, py);
                    }
                }

                if (currNode.children && currNode.children.length > 0) {
                    currNode.children.forEach(childId => {
                        const child = SCENE.objects[childId];
                        if (child) {
                            const childLocalMat = getObjectMatrix(child);
                            const childGlobalMat = multiplyMatrices(currMat, childLocalMat);
                            traverseBounds(child, childGlobalMat);
                        }
                    });
                }
            };

            traverseBounds(node, globalMat);

            if (minX === Infinity) {
                const origin = transformPoint(0, 0, globalMat);
                minX = origin.x - 3; maxX = origin.x + 3;
                minY = origin.y - 3; maxY = origin.y + 3;
            } else if (minX === maxX && minY === maxY) {
                minX -= 2; maxX += 2; minY -= 2; maxY += 2;
            }

            const margin = 2;
            minX -= margin; minY -= margin;
            maxX += margin; maxY += margin;

            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            if (minX !== Infinity) {
                const w = maxX - minX, h = maxY - minY;

                // dark halo so the outline stays visible over any background color
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.lineWidth = 3;
                ctx.setLineDash([]);
                ctx.strokeRect(minX, minY, w, h);

                // dashed accent line on top
                ctx.strokeStyle = '#00e5ff';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 2]);
                ctx.strokeRect(minX, minY, w, h);
                ctx.setLineDash([]);
            }

            // resize handles
            const handles = getResizeHandles(node);
            const hs = node.type === 'polygon' ? 0.8 : 1.5;
            const handleColor = node.type === 'polygon' ? '#2ecc40' : '#00e5ff';
            handles.forEach(hpt => {
                const wp = transformPoint(hpt.x, hpt.y, globalMat);
                ctx.fillStyle = handleColor;
                ctx.fillRect(wp.x - hs, wp.y - hs, hs * 2, hs * 2);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.lineWidth = 0.5;
                ctx.strokeRect(wp.x - hs, wp.y - hs, hs * 2, hs * 2);
            });

            // pivot marker: crosshair with contrasting outline
            const worldPos = transformPoint(node.pivotX || 0, node.pivotY || 0, globalMat);
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(worldPos.x - 3, worldPos.y);
            ctx.lineTo(worldPos.x + 3, worldPos.y);
            ctx.moveTo(worldPos.x, worldPos.y - 3);
            ctx.lineTo(worldPos.x, worldPos.y + 3);
            ctx.stroke();

            ctx.strokeStyle = '#ff3b3b';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(worldPos.x - 3, worldPos.y);
            ctx.lineTo(worldPos.x + 3, worldPos.y);
            ctx.moveTo(worldPos.x, worldPos.y - 3);
            ctx.lineTo(worldPos.x, worldPos.y + 3);
            ctx.stroke();

            ctx.fillStyle = '#ff3b3b';
            ctx.beginPath();
            ctx.arc(worldPos.x, worldPos.y, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // --- PREVIEW RENDERING ---
        function renderPreview() {
            const s = STATE.drawStartPos;
            const m = STATE.currentMouse;
            const color = STATE.defaultColor;

            ctx.strokeStyle = color;
            ctx.fillStyle = color;

            if (STATE.tool === 'rectangle') {
                const w = Math.round(Math.abs(m.x - s.x) + 1);
                const h = Math.round(Math.abs(m.y - s.y) + 1);
                const x = Math.round(Math.min(m.x, s.x));
                const y = Math.round(Math.min(m.y, s.y));
                ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
            }
            else if (STATE.tool === 'circle') {
                const r = Math.round(Math.sqrt(Math.pow(m.x - s.x, 2) + Math.pow(m.y - s.y, 2)));
                ctx.beginPath(); ctx.arc(Math.round(s.x), Math.round(s.y), r, 0, Math.PI * 2); ctx.stroke();
            }
            else if (STATE.tool === 'line') {
                ctx.beginPath();
                ctx.moveTo(Math.round(s.x), Math.round(s.y));
                ctx.lineTo(Math.round(m.x), Math.round(m.y));
                ctx.stroke();
            }
            else if (STATE.tool === 'regularPolygon') {
                const r = Math.round(Math.sqrt(Math.pow(m.x - s.x, 2) + Math.pow(m.y - s.y, 2)));
                const cx = Math.round(s.x);
                const cy = Math.round(s.y);
                const sides = 6;
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i * 2 * Math.PI / sides) - (Math.PI / 2);
                    const px = cx + r * Math.cos(angle);
                    const py = cy + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
            }
        }

        function renderPolyPreview() {
            ctx.fillStyle = '#aaa';
            STATE.polyVertices.forEach(v => ctx.fillRect(Math.round(v.x), Math.round(v.y), 1, 1));
            if (STATE.polyVertices.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = '#fff';
                ctx.moveTo(Math.round(STATE.polyVertices[0].x), Math.round(STATE.polyVertices[0].y));
                for (let i = 1; i < STATE.polyVertices.length; i++) ctx.lineTo(Math.round(STATE.polyVertices[i].x), Math.round(STATE.polyVertices[i].y));
                if (STATE.currentMouse) ctx.lineTo(Math.round(STATE.currentMouse.x), Math.round(STATE.currentMouse.y));
                ctx.stroke();
            }
        }

        // --- INTERACTION ---
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function hitTest(x, y) {
            const candidates = [];
            const traverse = (node, parentMat) => {
                const localMat = getObjectMatrix(node);
                const globalMat = multiplyMatrices(parentMat, localMat);

                if (node.id !== 'root') {
                    const invMat = invertMatrix(globalMat);
                    if (invMat) {
                        const loc = transformPoint(x, y, invMat);
                        if (checkLocalHit(loc.x, loc.y, node)) {
                            candidates.push({id: node.id, z: node.z || 0});
                        }
                    }
                }
                if (node.children) node.children.forEach(cid => traverse(SCENE.objects[cid], globalMat));
            };
            traverse(SCENE.root, [1, 0, 0, 1, 0, 0]);
            if (candidates.length > 0) return candidates[candidates.length - 1].id;
            return null;
        }

        function checkLocalHit(lx, ly, node) {
            const t = node.type;
            const tolerance = 1;

            if (t === 'rectangle') {
                return lx >= -tolerance && lx <= node.width + tolerance &&
                    ly >= -tolerance && ly <= node.height + tolerance;
            }
            if (t === 'circle' || t === 'regularPolygon') {
                return (lx * lx + ly * ly) <= Math.pow(node.radius + tolerance, 2);
            }
            if (t === 'point') {
                return Math.abs(lx) <= 2 && Math.abs(ly) <= 2;
            }
            if (t === 'line') {
                const dx = node.x2 - node.x;
                const dy = node.y2 - node.y;
                const lenSq = dx * dx + dy * dy;
                let param = -1;
                if (lenSq !== 0) param = (lx * dx + ly * dy) / lenSq;
                let xx, yy;
                if (param < 0) {xx = 0; yy = 0;}
                else if (param > 1) {xx = dx; yy = dy;}
                else {xx = param * dx; yy = param * dy;}
                const dist = Math.sqrt(Math.pow(lx - xx, 2) + Math.pow(ly - yy, 2));
                return dist <= 2;
            }
            if (t === 'polygon') {
                let inside = false;
                const vs = node.vertices;
                for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                    const xi = vs[i][0], yi = vs[i][1];
                    const xj = vs[j][0], yj = vs[j][1];
                    const intersect = ((yi > ly) !== (yj > ly)) &&
                        (lx < (xj - xi) * (ly - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
                return inside;
            }
            return false;
        }

        document.addEventListener('keydown', e => {
            if (e.shiftKey && e.key.toLowerCase() === 'g') {
                e.preventDefault();
                groupSelected();
            }
        });

        canvas.addEventListener('mousedown', e => {
            const pos = getMousePos(e);
            STATE.currentMouse = pos;

            if (STATE.tool === 'select') {
                const handleHit = hitTestResizeHandles(pos);
                if (handleHit) {
                    const node = SCENE.objects[handleHit.nodeId];
                    STATE.isResizing = true;
                    STATE.resizeNodeId = handleHit.nodeId;
                    STATE.resizeInvMat = invertMatrix(handleHit.globalMat);
                    STATE.resizeStart = {
                        width: node.width,
                        height: node.height,
                        radius: node.radius,
                        x: node.x,
                        y: node.y,
                        rotation: node.rotation || 0
                    };

                    if (node.type === 'rectangle') {
                        const corner = handleHit.corner;
                        const anchorLocal = oppositeRectCorner(corner, node.width, node.height);
                        const anchorGlobal = transformPoint(anchorLocal.x, anchorLocal.y, handleHit.globalMat);
                        const rotMat = getObjectMatrix({rotation: node.rotation || 0, pivotX: 0, pivotY: 0, x: 0, y: 0});
                        const f0Mat = getObjectMatrix({rotation: node.rotation || 0, pivotX: node.pivotX || 0, pivotY: node.pivotY || 0, x: 0, y: 0});
                        STATE.resizeStart.corner = corner;
                        STATE.resizeStart.anchorGlobal = anchorGlobal;
                        STATE.resizeStart.invRotMat = invertMatrix(rotMat);
                        STATE.resizeStart.f0Mat = f0Mat;
                    } else if (node.type === 'line') {
                        const corner = handleHit.corner;
                        const handles = getResizeHandles(node);
                        const anchorLocal = handles[1 - corner];
                        const anchorGlobal = transformPoint(anchorLocal.x, anchorLocal.y, handleHit.globalMat);
                        const rotMat = getObjectMatrix({rotation: node.rotation || 0, pivotX: 0, pivotY: 0, x: 0, y: 0});
                        const f0Mat = getObjectMatrix({rotation: node.rotation || 0, pivotX: node.pivotX || 0, pivotY: node.pivotY || 0, x: 0, y: 0});
                        STATE.resizeStart.corner = corner;
                        STATE.resizeStart.anchorGlobal = anchorGlobal;
                        STATE.resizeStart.invRotMat = invertMatrix(rotMat);
                        STATE.resizeStart.f0Mat = f0Mat;
                    } else if (node.type === 'polygon') {
                        STATE.resizeStart.vertexIndex = handleHit.corner;
                    }
                    return;
                }

                const hitId = hitTest(pos.x, pos.y);

                if (hitId) {
                    let targetId = null;

                    if (STATE.selectedIds.length > 0) {
                        const selectedAncestor = STATE.selectedIds.find(selId => {
                            let curr = SCENE.objects[hitId];
                            while (curr) {
                                if (curr.id === selId) return true;
                                if (!curr.parent) break;
                                curr = SCENE.objects[curr.parent];
                            }
                            return false;
                        });

                        if (selectedAncestor) {
                            targetId = selectedAncestor;
                        }
                    }

                    if (!targetId) {
                        let curr = SCENE.objects[hitId];
                        while (curr.parent && curr.parent !== 'root') {
                            curr = SCENE.objects[curr.parent];
                        }
                        targetId = curr.id;
                    }

                    if (e.ctrlKey) {
                        if (STATE.selectedIds.includes(targetId)) STATE.selectedIds = STATE.selectedIds.filter(i => i !== targetId);
                        else STATE.selectedIds.push(targetId);
                    } else {
                        if (!STATE.selectedIds.includes(targetId)) {
                            STATE.selectedIds = [targetId];
                        }
                    }

                    STATE.isDragging = true;
                    STATE.dragStart = pos;
                    STATE.dragOffsets = {};

                    STATE.selectedIds.forEach(id => {
                        const o = SCENE.objects[id];
                        STATE.dragOffsets[id] = {
                            initialX: o.x,
                            initialY: o.y,
                            initialX2: o.x2,
                            initialY2: o.y2,
                            clickX: pos.x,
                            clickY: pos.y
                        };
                    });

                } else {
                    if (!e.ctrlKey) STATE.selectedIds = [];
                }
                updatePropertiesPanel();
                renderLayerList();
                renderCanvas();
            }
            else if (STATE.tool === 'polygon') {
                STATE.polyVertices.push(pos);
                renderCanvas();
            }
            else {
                STATE.defaultColor = getRandomHexColor();
                STATE.isDrawing = true;
                STATE.drawStartPos = pos;
            }
        });

        canvas.addEventListener('mousemove', e => {
            const pos = getMousePos(e);
            STATE.currentMouse = pos;
            statusEl.innerText = `X: ${Math.round(pos.x)} Y: ${Math.round(pos.y)}`;

            if (STATE.isResizing) {
                const node = SCENE.objects[STATE.resizeNodeId];
                const rs = STATE.resizeStart;

                if (node.type === 'rectangle') {
                    // Keep the opposite corner fixed at rs.anchorGlobal: derive the
                    // drag vector in the shape's un-rotated local axes, then re-anchor.
                    const v = transformPoint(pos.x - rs.anchorGlobal.x, pos.y - rs.anchorGlobal.y, rs.invRotMat);
                    const signs = [[-1, -1], [1, -1], [1, 1], [-1, 1]][rs.corner];
                    const newWidth = Math.max(1, Math.round(v.x * signs[0]));
                    const newHeight = Math.max(1, Math.round(v.y * signs[1]));

                    const anchorLocalNew = oppositeRectCorner(rs.corner, newWidth, newHeight);
                    const anchorF = transformPoint(anchorLocalNew.x, anchorLocalNew.y, rs.f0Mat);

                    node.width = newWidth;
                    node.height = newHeight;
                    node.x = Math.round(rs.anchorGlobal.x - anchorF.x);
                    node.y = Math.round(rs.anchorGlobal.y - anchorF.y);
                } else if (node.type === 'circle' || node.type === 'regularPolygon') {
                    const local = transformPoint(pos.x, pos.y, STATE.resizeInvMat);
                    node.radius = Math.max(1, Math.round(Math.sqrt(local.x * local.x + local.y * local.y) / Math.SQRT2));
                } else if (node.type === 'line') {
                    const v = transformPoint(pos.x - rs.anchorGlobal.x, pos.y - rs.anchorGlobal.y, rs.invRotMat);
                    if (rs.corner === 1) {
                        node.x2 = Math.round(rs.x + v.x);
                        node.y2 = Math.round(rs.y + v.y);
                    } else {
                        const lNew = {x: -v.x, y: -v.y};
                        const anchorF = transformPoint(lNew.x, lNew.y, rs.f0Mat);
                        node.x = Math.round(rs.anchorGlobal.x - anchorF.x);
                        node.y = Math.round(rs.anchorGlobal.y - anchorF.y);
                        node.x2 = Math.round(node.x + lNew.x);
                        node.y2 = Math.round(node.y + lNew.y);
                    }
                } else if (node.type === 'polygon') {
                    const local = transformPoint(pos.x, pos.y, STATE.resizeInvMat);
                    node.vertices[rs.vertexIndex] = [Math.round(local.x), Math.round(local.y)];
                }

                updatePropertiesPanel();
                renderCanvas();
            }
            else if (STATE.tool === 'select' && STATE.isDragging) {
                STATE.selectedIds.forEach(id => {
                    const off = STATE.dragOffsets[id];
                    const o = SCENE.objects[id];
                    o.x = Math.round(off.initialX + (pos.x - off.clickX));
                    o.y = Math.round(off.initialY + (pos.y - off.clickY));
                    if (o.type === 'line') {
                        o.x2 = Math.round(off.initialX2 + (pos.x - off.clickX));
                        o.y2 = Math.round(off.initialY2 + (pos.y - off.clickY));
                    }
                });
                updatePropertiesPanel();
                renderCanvas();
            }
            else if (STATE.isDrawing || STATE.tool === 'polygon') {
                renderCanvas();
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (STATE.isResizing) {
                STATE.isResizing = false;
                STATE.resizeNodeId = null;
                STATE.resizeInvMat = null;
                STATE.resizeStart = null;
            }
            else if (STATE.tool === 'select') {
                STATE.isDragging = false;
            }
            else if (STATE.tool !== 'polygon' && STATE.isDrawing) {
                finishShape(STATE.currentMouse);
                STATE.isDrawing = false;
            }
        });

        canvas.addEventListener('dblclick', e => {
            if (STATE.tool === 'polygon') {
                STATE.polyVertices.pop();
                finishPoly();
                return;
            }

            if (STATE.tool === 'select') {
                const pos = getMousePos(e);

                if (STATE.selectedIds.length === 1) {
                    const selNode = SCENE.objects[STATE.selectedIds[0]];
                    if (selNode && selNode.type === 'polygon') {
                        const edgeHit = hitTestPolygonEdge(selNode, getGlobalMatrix(selNode.id), pos);
                        if (edgeHit) {
                            selNode.vertices.splice(edgeHit.insertIndex, 0, edgeHit.point);
                            renderCanvas();
                            updatePropertiesPanel();
                            return;
                        }
                    }
                }

                const hitId = hitTest(pos.x, pos.y);

                if (hitId) {
                    let targetId = hitId;

                    if (STATE.selectedIds.length === 1) {
                        const currentSelId = STATE.selectedIds[0];

                        let ancestorChain = [];
                        let curr = SCENE.objects[hitId];
                        let foundCurrent = false;

                        while (curr) {
                            ancestorChain.push(curr.id);
                            if (curr.id === currentSelId) {
                                foundCurrent = true;
                                break;
                            }
                            if (curr.parent === 'root' || !curr.parent) break;
                            curr = SCENE.objects[curr.parent];
                        }

                        if (foundCurrent) {
                            if (ancestorChain.length >= 2) {
                                targetId = ancestorChain[ancestorChain.length - 2];
                            } else {
                                targetId = hitId;
                            }
                        } else {
                            let top = SCENE.objects[hitId];
                            while (top.parent && top.parent !== 'root') {
                                top = SCENE.objects[top.parent];
                            }
                            targetId = top.id;
                        }
                    } else {
                        let top = SCENE.objects[hitId];
                        while (top.parent && top.parent !== 'root') {
                            top = SCENE.objects[top.parent];
                        }
                        targetId = top.id;
                    }

                    STATE.selectedIds = [targetId];
                    updatePropertiesPanel();
                    renderLayerList();
                    renderCanvas();
                }
            }
        });

        canvas.addEventListener('contextmenu', e => {
            e.preventDefault();
            if (STATE.tool !== 'select') return;

            const pos = getMousePos(e);
            const handleHit = hitTestResizeHandles(pos);
            if (!handleHit) return;

            const node = SCENE.objects[handleHit.nodeId];
            if (node.type === 'polygon' && node.vertices.length > 3) {
                node.vertices.splice(handleHit.corner, 1);
                updatePropertiesPanel();
                renderCanvas();
            }
        });

        function finishShape(endPos) {
            const start = STATE.drawStartPos;
            let props = {
                x: Math.round(start.x),
                y: Math.round(start.y),
                color: STATE.defaultColor,
                fill: STATE.defaultFill
            };

            if (STATE.tool === 'rectangle') {
                props.x = Math.round(Math.min(start.x, endPos.x));
                props.y = Math.round(Math.min(start.y, endPos.y));
                props.width = Math.round(Math.abs(endPos.x - start.x) + 1);
                props.height = Math.round(Math.abs(endPos.y - start.y) + 1);
            } else if (STATE.tool === 'circle') {
                props.radius = Math.round(Math.sqrt(Math.pow(endPos.x - start.x, 2) + Math.pow(endPos.y - start.y, 2)));
            } else if (STATE.tool === 'line') {
                props.x2 = Math.round(endPos.x);
                props.y2 = Math.round(endPos.y);
            } else if (STATE.tool === 'point') {
                props.x = Math.round(endPos.x);
                props.y = Math.round(endPos.y);
            } else if (STATE.tool === 'regularPolygon') {
                props.radius = Math.round(Math.sqrt(Math.pow(endPos.x - start.x, 2) + Math.pow(endPos.y - start.y, 2)));
                props.sides = 6;
            }

            const newShape = createShape(STATE.tool, props);
            STATE.selectedIds = [newShape.id];
            renderLayerList();
            updatePropertiesPanel();
            renderCanvas();
            selectTool('select');
        }

        function finishPoly() {
            if (STATE.polyVertices.length < 3) return;
            let minX = 100, minY = 100;
            STATE.polyVertices.forEach(v => {
                v.x = Math.round(v.x);
                v.y = Math.round(v.y);
                if (v.x < minX) minX = v.x;
                if (v.y < minY) minY = v.y;
            });

            const relVerts = STATE.polyVertices.map(v => [v.x - minX, v.y - minY]);

            createShape('polygon', {
                x: minX, y: minY,
                vertices: relVerts,
                color: STATE.defaultColor,
                fill: STATE.defaultFill
            });

            STATE.polyVertices = [];
            renderLayerList();
            renderCanvas();
            selectTool('select');
        }

        // --- UI UPDATES ---
        function selectTool(t) {
            STATE.tool = t;
            STATE.polyVertices = [];
            document.querySelectorAll('.sidebar-left button').forEach(b => b.classList.remove('active'));
            let id = 'tool-' + t;
            if (t === 'regularPolygon') id = 'tool-regpoly';
            if (t === 'polygon') id = 'tool-poly';

            const btn = document.getElementById(id);
            if (btn) btn.classList.add('active');
        }

        let dragSrcId = null;

        function renderLayerList() {
            layerListEl.innerHTML = '';

            layerListEl.ondragover = (e) => e.preventDefault();
            layerListEl.ondrop = (e) => {
                e.preventDefault();
                moveObject(dragSrcId, 'root');
            };

            const traverse = (nodeId, depth) => {
                const node = SCENE.objects[nodeId];
                if (!node) return;

                const children = [...(node.children || [])];
                children.sort((a, b) => (SCENE.objects[b].z || 0) - (SCENE.objects[a].z || 0));

                if (nodeId !== 'root') {
                    const el = document.createElement('div');
                    el.className = 'layer-item' + (STATE.selectedIds.includes(nodeId) ? ' selected' : '');

                    el.draggable = true;
                    el.style.cursor = 'grab';

                    el.ondragstart = (e) => {
                        e.stopPropagation();
                        dragSrcId = nodeId;
                        e.dataTransfer.effectAllowed = 'move';
                        el.style.opacity = '0.5';
                    };

                    el.ondragend = (e) => {
                        el.style.opacity = '1';
                    };

                    el.ondragover = (e) => {
                        e.preventDefault();
                        if (SCENE.objects[nodeId].type === 'collection') {
                            el.style.border = '1px dashed #007acc';
                        }
                    };

                    el.ondragleave = (e) => {
                        el.style.border = 'none';
                        if (STATE.selectedIds.includes(nodeId)) el.style.borderLeft = '2px solid var(--accent-color)';
                    };

                    el.ondrop = (e) => {
                        e.stopPropagation();
                        el.style.border = 'none';
                        if (SCENE.objects[nodeId].type === 'collection') {
                            moveObject(dragSrcId, nodeId);
                        }
                    };
                    // ---------------------------

                    let icon = '⬜';
                    if (node.type === 'collection') icon = '📁';
                    else if (node.type === 'circle') icon = '⚪';
                    else if (node.type === 'point') icon = '·';
                    else if (node.type === 'line') icon = '/';

                    el.innerHTML = `<span class="indent" style="width:${depth * 15}px"></span><span class="layer-icon">${icon}</span> ${node.name} <span style="font-size:10px; opacity:0.5; margin-left:5px;">(z:${node.z})</span>`;

                    el.onclick = (e) => {
                        if (e.ctrlKey) {
                            if (STATE.selectedIds.includes(nodeId)) STATE.selectedIds = STATE.selectedIds.filter(i => i !== nodeId);
                            else STATE.selectedIds.push(nodeId);
                        } else {
                            STATE.selectedIds = [nodeId];
                        }
                        updatePropertiesPanel();
                        renderCanvas();
                        renderLayerList();
                    };
                    layerListEl.appendChild(el);
                }
                children.forEach(cid => traverse(cid, nodeId === 'root' ? 0 : depth + 1));
            };
            traverse('root', 0);
        }

        function updatePropertiesPanel() {
            propPanelEl.innerHTML = '';
            if (STATE.selectedIds.length !== 1) {
                if (STATE.selectedIds.length > 1) propPanelEl.innerHTML = '<p style="color:#888; text-align:center">Vybráno více objektů</p>';
                else propPanelEl.innerHTML = '<p style="color:#888; text-align:center">Nic není vybráno</p>';
                return;
            }

            const obj = SCENE.objects[STATE.selectedIds[0]];
            const createInput = (label, type, val, key, step = 1) => {
                const div = document.createElement('div');
                div.className = 'row';
                div.innerHTML = `<label>${label}</label>`;
                const inp = document.createElement('input');
                inp.type = type;
                if (type === 'checkbox') inp.checked = val;
                else inp.value = val;

                inp.onchange = (e) => {
                    if (type === 'number') obj[key] = parseFloat(e.target.value);
                    else if (type === 'checkbox') obj[key] = e.target.checked;
                    else obj[key] = e.target.value;
                    renderCanvas();
                    renderLayerList();
                };
                div.appendChild(inp);
                propPanelEl.appendChild(div);
            };

            createInput('Název', 'text', obj.name, 'name');
            createInput('X', 'number', obj.x, 'x');
            createInput('Y', 'number', obj.y, 'y');
            createInput('Z', 'number', obj.z, 'z');
            createInput('Rotace', 'number', obj.rotation, 'rotation');
            createInput('Barva', 'color', obj.color, 'color');
            createInput('Střed X', 'number', obj.pivotX || 0, 'pivotX');
            createInput('Střed Y', 'number', obj.pivotY || 0, 'pivotY');

            if (obj.type !== 'collection' && obj.type !== 'line') {
                createInput('Výplň', 'checkbox', obj.fill, 'fill');
            }

            if (obj.type === 'rectangle') {
                createInput('Šířka', 'number', obj.width, 'width');
                createInput('Výška', 'number', obj.height, 'height');
            } else if (obj.type === 'circle' || obj.type === 'regularPolygon') {
                createInput('Poloměr', 'number', obj.radius, 'radius');
            }
            if (obj.type === 'regularPolygon') {
                createInput('Strany', 'number', obj.sides, 'sides');
            }
            if (obj.type === 'line') {
                createInput('X2', 'number', obj.x2, 'x2');
                createInput('Y2', 'number', obj.y2, 'y2');
            }
        }

        function generateCode() {
            let c = `const scene = new Collection({ x: 0, y: 0, color: ${hexToRgbCall(SCENE.root.color)}, z: 0 });\n\n`;

            const usedNames = new Set();

            const processNode = (nodeId, parentVarName) => {
                const node = SCENE.objects[nodeId];
                if (nodeId === 'root') {
                    node.children.forEach(childId => processNode(childId, 'scene'));
                    return;
                }

                let baseName = node.name.replace(/[^a-zA-Z0-9]/g, '_');
                let safeName = baseName;
                let counter = 1;
                while (usedNames.has(safeName)) {
                    safeName = baseName + '_' + counter;
                    counter++;
                }
                usedNames.add(safeName);

                const colStr = hexToRgbCall(node.color);

                if (node.type === 'collection') {
                    c += `const ${safeName} = new Collection({ x: ${node.x}, y: ${node.y}, color: ${colStr}, z: ${node.z} });\n`;
                    c += `${parentVarName}.add(${safeName});\n`;
                    if (node.rotation) c += `${safeName}.setRotationAngle(${node.rotation});\n`;
                    if (node.pivotX || node.pivotY) c += `${safeName}.setPivot(${node.pivotX || 0}, ${node.pivotY || 0});\n`;
                    c += `\n`;
                    if (node.children) {
                        node.children.forEach(childId => processNode(childId, safeName));
                    }
                }
                else {
                    let className = '';
                    let props = `\tx: ${node.x}, y: ${node.y},\n`;
                    props += `\tcolor: ${colStr},\n`;
                    props += `\tz: ${node.z},\n`;

                    if (node.type === 'rectangle') {
                        className = 'Rectangle';
                        props += `\twidth: ${node.width}, height: ${node.height},\n\tfill: ${node.fill}`;
                    } else if (node.type === 'circle') {
                        className = 'Circle';
                        props += `\tradius: ${node.radius},\n\tfill: ${node.fill}`;
                    } else if (node.type === 'line') {
                        className = 'LineSegment';
                        props += `\tx2: ${node.x2}, y2: ${node.y2}`;
                    } else if (node.type === 'point') {
                        className = 'Point';
                    } else if (node.type === 'regularPolygon') {
                        className = 'RegularPolygon';
                        props += `\tradius: ${node.radius}, sides: ${node.sides},\n\tfill: ${node.fill}`;
                    } else if (node.type === 'polygon') {
                        className = 'Polygon';
                        props += `\tfill: ${node.fill},\n\tvertices: ${JSON.stringify(node.vertices)}`;
                    }

                    c += `const ${safeName} = new ${className}({\n${props}\n});\n`;
                    if (node.rotation) c += `${safeName}.setRotationAngle(${node.rotation});\n`;
                    if (node.pivotX || node.pivotY) c += `${safeName}.setPivot(${node.pivotX || 0}, ${node.pivotY || 0});\n`;
                    c += `${parentVarName}.add(${safeName});\n\n`;
                }
            };
            processNode('root', 'scene');
            c += `return scene;\n`;

            const indented = c.split('\n').map(line => line ? '\t' + line : line).join('\n');
            codeOutputEl.value = `async function generateScene() {\n${indented}}\n`;
        }

        function hexToRgbCall(hex) {
            if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
                let c = hex.substring(1).split('');
                if (c.length == 3) {
                    c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                const num = parseInt(c.join(''), 16);
                return `rgb(${(num >> 16) & 255}, ${(num >> 8) & 255}, ${num & 255})`;
            }
            return 'rgb(255, 255, 255)';
        }

        function copyToClipboard() {
            codeOutputEl.select();
            document.execCommand('copy');
        }

        init();
    </script>
</body>
