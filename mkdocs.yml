      - robodeck/kroky/04-dokonceni.md
  - Programovací lekce:
      - lekce/index.md
      - lekce/faq/index.md
      - lekce/lekce0/index.md
      - lekce/lekce1/index.md
      - lekce/lekce2/index.md
      - lekce/lekce2-1/index.md
      - lekce/lekce3/index.md
      - lekce/lekce4/index.md
      - lekce/lekce4-5/index.md
      - lekce/lekce5/index.md
      - lekce/lekce6/index.md
      - lekce/lekce7/index.md
      #- lekce/lekce8/index.md
      #- lekce/lekce9/index.md
